# pi-pp-platform parity matrix
#
# Machine-readable audit of pair-programmer → platform capability parity, grown
# milestone by milestone. `node parity/audit.mjs` verifies every row and prints
# a scoreboard; rows with status=done whose verify checks fail make the audit
# exit nonzero. status=pending rows are reported but never fail the build.
#
# Row shape:
#   id            unique id (subsystem-prefixed)
#   subsystem     grouping key for the scoreboard
#   capability    human description
#   disposition   PORT | ADAPT | REBUILD | DROP_REPLACED
#   replacement_note?  where it lives now / why dropped
#   verify        list of checks (see parity/audit.mjs for the supported types)
#   status        done | pending
#
# verify check types:
#   {type: asset-count, dir, ext, expect}     count files *.ext under dir (recursive)
#   {type: export, module, symbol, op, expect} op: defined | len | keys-len | call-len
#   {type: test, file, contains?}             file exists (+ optional substring)
#   {type: todo, note}                        pending marker (skipped)
#   {type: endpoint, path, note}              server endpoint marker (skipped)

