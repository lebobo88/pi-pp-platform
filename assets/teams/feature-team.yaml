name: feature-team
description: New customer-facing feature, end to end. Spec → architecture → contracts → code → tests → docs.
profiles_compatible: [web-ui, api-platform, internal-tool, mobile, ai-agentic]
stages:
  - kind: spec
    gate_type: spec
    generator: { agent: spec-author, primary: claude, fallback: codex }
    judge:     { tier: cross_vendor, rubric: rfc-2119-normative@1, model_pref: gemini }
  - kind: architecture
    gate_type: design
    generator: { agent: architect, primary: claude }
    judge:     { tier: cross_vendor, rubric: c4-system-context@1, model_pref: codex }
  - kind: contracts
    gate_type: contract
    generator: { agent: api-designer, primary: codex }
    judge:     { tier: cross_vendor, rubric: openapi-3.1-stability@1, model_pref: gemini }
  - kind: code
    gate_type: code_style
    generator: { agent: engineer, primary: codex }
    judge:     { tier: same_vendor, model_pref: codex_alt_model }
    # R3-tail Fix 0.4 (2026-05-21): when triage scope=major, fan out to 3
    # parallel candidates and Borda-pick a winner instead of reflexion-ing
    # one engineer to death. R3-tail δ took 10 retry rounds + 4 operator
    # overrides on what should have been a 3-candidate race. Trivial /
    # standard scope still uses the single-engineer + Reflexion ×1 path.
    best_of_n_on_major_scope: 3
  - kind: tests
    artifact_kind: test_plan
    gate_type: contract
    generator: { agent: test-strategist, primary: codex }
    judge:     { tier: cross_vendor, model_pref: gemini }
  - kind: browser_validation
    artifact_kind: browser_validation_report
    gate_type: contract
    generator: { agent: browser-validator, primary: claude }
    judge:     { tier: same_vendor, rubric: web-runtime-validation@2 }
  - kind: docs
    gate_type: docs_polish
    generator: { agent: docs-author, primary: claude }
    judge:     { tier: same_vendor, model_pref: claude_alt_model }
taxonomy_required: ["4.3", "4.6", "4.7", "4.10", "4.13"]
missability_required: ["nfrs-declared", "decision-logging", "test-data-management", "browser-validation-evidence"]
