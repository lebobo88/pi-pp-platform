name: ai-controls-team
description: Ship/modify an AI feature with NIST AI RMF-aligned controls.
profiles_compatible: [ai-agentic, enterprise, web-ui, api-platform]
stages:
  - kind: ai_system_spec
    gate_type: spec
    generator: { agent: ai-controls-author, primary: claude }
    judge:     { tier: cross_vendor, rubric: nist-ai-rmf-govern@1, model_pref: gemini }
  - kind: eval_suite
    gate_type: contract
    generator: { agent: test-strategist, primary: codex }
    judge:     { tier: cross_vendor, rubric: nist-ai-rmf-measure@1, model_pref: gemini }
  - kind: tool_permissions
    artifact_kind: tool_permission_matrix
    gate_type: security
    generator: { agent: security-reviewer, primary: claude }
    judge:     { tier: cross_vendor, rubric: owasp-asvs-l1@1, model_pref: gemini }
  - kind: hitl_workflow
    gate_type: design
    generator: { agent: architect, primary: claude }
    judge:     { tier: cross_vendor, model_pref: codex }
  - kind: docs
    gate_type: docs_polish
    generator: { agent: docs-author, primary: claude }
    judge:     { tier: same_vendor }
taxonomy_required: ["4.3", "4.9", "4.10", "4.13", "4.15"]
missability_required: ["ai-evals-hitl", "decision-logging"]
