name: game-netcode-team
description: "Online / netcode design — replication topology, server-auth audit, determinism invariants, load-test plan, anti-cheat integration. Profile-gated to online: true."
profiles_compatible: [game-dev, game-dev-unity, game-dev-unreal, game-dev-godot, game-dev-web, game-dev-custom]
stages:
  - kind: netcode_topology_design
    gate_type: design
    generator: { agent: netcode-programmer, primary: claude }
    judge:     { tier: cross_vendor, rubric: c4-system-context@1, model_pref: codex }
  - kind: determinism_invariants
    gate_type: spec
    generator: { agent: netcode-programmer, primary: claude }
    judge:     { tier: cross_vendor, rubric: rfc-2119-normative@1, model_pref: gemini }
  - kind: server_auth_audit
    gate_type: security
    generator: { agent: game-security, primary: claude }
    judge:     { tier: cross_vendor, rubric: owasp-asvs-l2@1, model_pref: gemini }
  - kind: anti_cheat_integration
    gate_type: security
    generator: { agent: game-security, primary: claude }
    judge:     { tier: same_vendor }
  - kind: load_test_plan
    gate_type: contract
    generator: { agent: test-strategist, primary: codex }
    judge:     { tier: cross_vendor, model_pref: gemini }
  - kind: docs
    gate_type: docs_polish
    generator: { agent: docs-author, primary: claude }
    judge:     { tier: same_vendor }
taxonomy_required: ["4.6", "4.7", "4.9", "4.10", "4.13"]
missability_required:
  - client-trusted-input
  - determinism-claimed-not-enforced
  - latency-jitter-visualization
  - host-migration-recovery
  - decision-logging
