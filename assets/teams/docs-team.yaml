name: docs-team
description: Pure documentation / release-notes / runbook work.
profiles_compatible: [web-ui, api-platform, internal-tool, mobile, sdk, ai-agentic, embedded, non-ui-cli, data-product, enterprise]
stages:
  - kind: outline
    gate_type: docs_polish
    generator: { agent: docs-author, primary: claude }
    judge:     { tier: same_vendor, model_pref: claude_alt_model }
  - kind: draft
    gate_type: docs_polish
    generator: { agent: docs-author, primary: claude }
    judge:     { tier: same_vendor }
  - kind: lint
    gate_type: lint_class
    generator: { agent: docs-author, primary: codex }
    judge:     { tier: same_vendor }
taxonomy_required: ["4.13"]
missability_required: ["doc-ownership"]
