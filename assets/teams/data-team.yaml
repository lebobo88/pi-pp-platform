name: data-team
description: Entities/ERD/lineage/retention/migration/analytics events. Maps to taxonomy section 4.5.
profiles_compatible: [data-product, api-platform, enterprise, ai-agentic, mobile, internal-tool]
stages:
  - kind: entities_erd
    gate_type: design
    generator: { agent: data-modeler, primary: claude }
    judge:     { tier: cross_vendor, rubric: c4-system-context@1, model_pref: gemini }
  - kind: lineage
    gate_type: contract
    generator: { agent: data-modeler, primary: claude }
    judge:     { tier: cross_vendor, rubric: metric-dictionary@1, model_pref: gemini }
  - kind: retention_deletion
    gate_type: security
    generator: { agent: security-reviewer, primary: claude }
    judge:     { tier: cross_vendor, rubric: owasp-asvs-l1@1, model_pref: gemini }
  - kind: migration_plan
    gate_type: design
    generator: { agent: data-modeler, primary: codex }
    judge:     { tier: cross_vendor, model_pref: gemini }
  - kind: analytics_events
    gate_type: spec
    generator: { agent: data-modeler, primary: claude }
    judge:     { tier: cross_vendor, rubric: metric-dictionary@1, model_pref: gemini }
taxonomy_required: ["4.5"]
missability_required: ["analytics-semantics", "schema-evolution", "retention-deletion"]
