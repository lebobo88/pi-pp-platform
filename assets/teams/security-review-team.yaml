name: security-review-team
description: Threat model + ASVS-aligned review for a change set.
profiles_compatible: [web-ui, api-platform, internal-tool, enterprise, ai-agentic, mobile, sdk, data-product]
stages:
  - kind: threat_model
    gate_type: security
    generator: { agent: security-reviewer, primary: claude }
    judge:     { tier: cross_vendor, rubric: owasp-asvs-l1@1, model_pref: gemini }
  - kind: control_mapping
    gate_type: security
    generator: { agent: security-reviewer, primary: codex }
    judge:     { tier: cross_vendor, rubric: owasp-asvs-l1@1, model_pref: gemini }
  - kind: docs
    gate_type: docs_polish
    generator: { agent: docs-author, primary: claude }
    judge:     { tier: same_vendor }
taxonomy_required: ["4.9", "4.13"]
missability_required: ["security-review-timing", "supply-chain-integrity"]
